<!doctype html>
<html lang="en">
  <head>
    <!-- ================== BASIC META ================== -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />

    <!-- ================== SEO ================== -->
    <title>INIQ — Interview Intelligence Platform</title>
    <meta
      name="description"
      content="INIQ is an AI-powered platform to explore real interview experiences, analyze patterns, and generate personalized preparation roadmaps."
    />
    <meta
      name="keywords"
      content="interview experience, coding interview, system design, AI interview prep, INIQ"
    />
    <meta name="author" content="INIQ Team" />

    <!-- ================== FAVICON ================== -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ================== OPEN GRAPH ================== -->
    <meta property="og:title" content="INIQ — Interview Intelligence Platform" />
    <meta
      property="og:description"
      content="Explore structured interview experiences and AI-driven insights to prepare smarter."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://iniq.app" />
    <meta property="og:image" content="/assets/images/preview.png" />

    <!-- ================== TWITTER ================== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="INIQ Platform" />
    <meta
      name="twitter:description"
      content="AI-powered platform for interview preparation and insights."
    />
    <meta name="twitter:image" content="/assets/images/preview.png" />

    <!-- ================== PERFORMANCE ================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ================== FONTS ================== -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Sora:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- ================== MANIFEST (OPTIONAL PWA) ================== -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ================== APPLE SUPPORT ================== -->
    <link rel="apple-touch-icon" href="/assets/icons/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- ================== ROBOTS ================== -->
    <meta name="robots" content="index, follow" />
  </head>
  <body>
    <!-- ================== ROOT ================== -->
    <div id="root"></div>

    <!-- ================== NOSCRIPT FALLBACK ================== -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <!-- ================== VITE ENTRY ================== -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
